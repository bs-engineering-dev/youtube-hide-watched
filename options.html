<!DOCTYPE html>
<html>
<head>
<style>
  body {
    width: 320px;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px;
    color: #1a1a1a;
    margin: 0;
  }
  h2 {
    font-size: 16px;
    margin: 0 0 16px;
  }
  .field {
    margin-bottom: 16px;
  }
  label {
    display: block;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .hint {
    font-size: 12px;
    color: #666;
    margin-top: 4px;
  }
  input[type="range"] {
    width: 100%;
  }
  .threshold-val {
    font-weight: 600;
  }
  .checkbox-label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }
  .checkbox-label input {
    width: 16px;
    height: 16px;
    margin: 0;
  }
  .cache-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  button {
    background: #c00;
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
  }
  button:hover {
    background: #a00;
  }
  .status {
    font-size: 12px;
    color: #090;
    margin-top: 8px;
    min-height: 16px;
  }
</style>
</head>
<body>
  <h2>Settings</h2>
  <div class="field">
    <label>Watch threshold: <span class="threshold-val" id="threshold-display">1%</span></label>
    <input type="range" id="threshold" min="1" max="100" value="1">
    <div class="hint">Hide videos watched past this percentage</div>
  </div>
  <div class="field">
    <label class="checkbox-label">
      <input type="checkbox" id="hideMostRelevant" checked>
      Hide "Most relevant" section
    </label>
  </div>
  <div class="field">
    <label>Manually hidden videos</label>
    <div class="cache-row">
      <span id="cache-count">0 videos cached</span>
      <button id="clear-cache">Clear cache</button>
    </div>
  </div>
  <div class="status" id="status"></div>
  <script src="options.js"></script>
</body>
</html>
