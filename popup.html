<!DOCTYPE html>
<html>
<head>
<style>
  body {
    width: 280px;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px;
    color: #1a1a1a;
    margin: 0;
  }
  .header {
    font-weight: 600;
    margin-bottom: 12px;
  }
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .switch {
    position: relative;
    width: 40px;
    height: 22px;
  }
  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }
  .slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background: #ccc;
    border-radius: 22px;
    transition: background 0.2s;
  }
  .slider::before {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    left: 3px;
    bottom: 3px;
    background: white;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  input:checked + .slider {
    background: #c00;
  }
  input:checked + .slider::before {
    transform: translateX(18px);
  }
  .mark-all-btn {
    width: 100%;
    margin-top: 12px;
    padding: 8px 0;
    background: #c00;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .mark-all-btn:hover {
    background: #a00;
  }
  .mark-all-btn:disabled {
    background: #888;
    cursor: default;
  }
  .divider {
    border: none;
    border-top: 1px solid #e0e0e0;
    margin: 12px 0;
  }
  .field {
    margin-bottom: 12px;
  }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .hint {
    font-size: 11px;
    color: #888;
    margin-top: 2px;
  }
  input[type="range"] {
    width: 100%;
    margin: 0;
  }
  .threshold-val {
    font-weight: 600;
  }
  .checkbox-label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
  }
  .checkbox-label input {
    width: 14px;
    height: 14px;
    margin: 0;
  }
  .cache-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cache-row span {
    font-size: 13px;
  }
  .clear-btn {
    background: none;
    border: 1px solid #ccc;
    color: #555;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
  }
  .clear-btn:hover {
    background: #f5f5f5;
    border-color: #aaa;
  }
  .cache-bar-row {
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .cache-bar {
    flex: 1;
    height: 6px;
    background: #e5e7eb;
    border-radius: 3px;
    overflow: hidden;
  }
  .cache-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: #16a34a;
    width: 0%;
    transition: width 0.3s, background 0.3s;
  }
  .cache-bar-label {
    font-size: 11px;
    color: #888;
    white-space: nowrap;
  }
  .cache-warning {
    font-size: 11px;
    color: #92400e;
    background: #fef3c7;
    border: 1px solid #f59e0b;
    border-radius: 4px;
    padding: 6px 8px;
    margin-top: 8px;
    display: none;
  }
  .status {
    font-size: 11px;
    color: #090;
    margin-top: 4px;
    min-height: 14px;
  }
</style>
</head>
<body>
  <div class="header">Hide Watched YouTube Videos</div>
  <div class="toggle-row">
    <span>Hide watched videos</span>
    <label class="switch">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>
  <button class="mark-all-btn" id="markAll">Mark All Watched</button>
  <hr class="divider">
  <div class="field">
    <label>Watch threshold: <span class="threshold-val" id="threshold-display">1%</span></label>
    <input type="range" id="threshold" min="1" max="100" value="1">
    <div class="hint">Hide videos watched past this percentage</div>
  </div>
  <div class="field">
    <label>Subscriptions max age: <span class="threshold-val" id="maxage-display">Off</span></label>
    <input type="range" id="maxAgeDays" min="0" max="90" value="0">
    <div class="hint">Hide videos older than this on Subscriptions (0 = off)</div>
  </div>
  <div class="field">
    <label class="checkbox-label">
      <input type="checkbox" id="hideMostRelevant" checked>
      Hide "Most relevant" section
    </label>
  </div>
  <div class="field">
    <label class="checkbox-label">
      <input type="checkbox" id="hideLatest" checked>
      Hide "Latest" section
    </label>
  </div>
  <div class="field">
    <label class="checkbox-label">
      <input type="checkbox" id="hideShorts">
      Hide "Shorts" section
    </label>
  </div>
  <div class="field">
    <label class="checkbox-label">
      <input type="checkbox" id="iconOnThumbnail">
      Show hide icon on thumbnail
    </label>
    <div class="hint">When off, icon appears next to video metadata</div>
  </div>
  <div class="field">
    <div class="cache-row">
      <span id="cache-count">0 videos cached</span>
      <button class="clear-btn" id="clear-cache">Clear cache</button>
    </div>
    <div class="cache-bar-row">
      <div class="cache-bar"><div class="cache-bar-fill" id="cache-bar-fill"></div></div>
      <span class="cache-bar-label" id="cache-bar-label">0 MB / 10 MB</span>
    </div>
  </div>
  <div class="cache-warning" id="cache-warning">Cache is nearing the storage limit. Oldest entries will be auto-removed.</div>
  <div class="status" id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
