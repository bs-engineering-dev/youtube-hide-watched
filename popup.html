<!DOCTYPE html>
<html>
<head>
<style>
  body {
    width: 220px;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px;
    color: #1a1a1a;
    margin: 0;
  }
  .header {
    font-weight: 600;
    margin-bottom: 12px;
  }
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .switch {
    position: relative;
    width: 40px;
    height: 22px;
  }
  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }
  .slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background: #ccc;
    border-radius: 22px;
    transition: background 0.2s;
  }
  .slider::before {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    left: 3px;
    bottom: 3px;
    background: white;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  input:checked + .slider {
    background: #c00;
  }
  input:checked + .slider::before {
    transform: translateX(18px);
  }
  .footer {
    margin-top: 12px;
    font-size: 11px;
    color: #888;
  }
  .footer a {
    color: #555;
    cursor: pointer;
    text-decoration: underline;
  }
  .mark-all-btn {
    width: 100%;
    margin-top: 12px;
    padding: 8px 0;
    background: #c00;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .mark-all-btn:hover {
    background: #a00;
  }
  .mark-all-btn:disabled {
    background: #888;
    cursor: default;
  }
</style>
</head>
<body>
  <div class="header">Hide Watched</div>
  <div class="toggle-row">
    <span>Hide watched videos</span>
    <label class="switch">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>
  <button class="mark-all-btn" id="markAll">Mark All Watched</button>
  <div class="footer">
    <a id="options">Settings</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
